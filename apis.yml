aid: exelis
name: Exelis
description: >-
  Exelis Inc. was an American global aerospace, defense, information, and
  services company that produced communications systems, electronic warfare
  products, geospatial systems, integrated structures, and night vision
  equipment. Headquartered in McLean, Virginia, Exelis was acquired by Harris
  Corporation in 2015. Harris and L3 Technologies then merged in 2019 to form
  L3Harris Technologies. No public APIs are published under the Exelis brand;
  developer resources, if any, are tracked under L3Harris.
